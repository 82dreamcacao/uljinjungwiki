<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>내 위키</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      display: flex;
    }

    .sidebar {
      width: 200px;
      background: #f4f4f4;
      padding: 15px;
      height: 100vh;
    }

    .content {
      flex: 1;
      padding: 20px;
      max-width: 800px;
    }

    a {
      text-decoration: none;
      color: blue;
    }

    h1 {
      border-bottom: 2px solid #ddd;
      padding-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 5px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h3> 2학년 5반 위키</h3>
    <ul id="list">
      <li><a href="2-5class.html">반 소개</a></li>
      <li><a href="student-list.html">학생 목록 </a></li>
    </ul>
  </div>

  <div class="content">
    <h1>내 위키 사이트</h1>
    <p>테스트 중</p>

    <h3>🔍 검색</h3>
    <input type="text" placeholder="문서 검색..."> onkeyup="searchWiki()">

    <p>왼쪽에서 문서를 선택하세요.</p>
  </div>
<script>
function searchWiki() {
  let input = document.getElementById("search").value.toLowerCase();
  let items = document.querySelectorAll("#list li");

  items.forEach(item => {
    let text = item.textContent.toLowerCase();
    item.style.display = text.includes(input) ? "" : "none";
  });
}
</script>

</body>
</html>
